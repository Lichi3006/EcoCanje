services:
  mongodb:
    image: mongo:latest
    container_name: ecocanje_mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ecocanje_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  cassandra:
    image: cassandra:latest
    container_name: ecocanje_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=EcoCanjeCluster
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecocanje_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CASSANDRA_HOSTS=cassandra
    depends_on:
      - mongodb
      - redis
      - cassandra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
      - ./backend:/app
    restart: unless-stopped

  edge_service:
    build:
      context: ./edge_service
      dockerfile: Dockerfile
    container_name: ecocanje_edge
    environment:
      - BACKEND_URL=http://backend:8000/telemetria/eventos
      - TERMINAL_ID=TERM-CABA-005
      - SQLITE_DB_PATH=ecocanje_edge.db
    depends_on:
      - backend
    stdin_open: true
    tty: true
    ports:
      - "8001:8001"
    restart: unless-stopped


